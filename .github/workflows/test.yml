name: PR Docker Build

on:
  pull_request:
    branches:
      - "main"
  push:
    branches:
      - "main"

jobs:
  test:

    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build:

    runs-on: ubuntu-latest

    needs: test

    permissions:
      contents: read
      packages: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: omnichannel-fitness-agent:pr-${{ github.event.pull_request.number }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new

      - name: Clean cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  smoke-test:

    runs-on: ubuntu-latest

    needs: build

    permissions:
      contents: read

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Start CI stack (API + Postgres)
        run: docker compose -f docker-compose.ci.yml up -d --build

      - name: Wait for API to be ready on port 8000
        run: |
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "API is ready after ${i} attempts."
              break
            fi
            echo "  attempt $i/30 — not ready yet, sleeping 3s"
            sleep 3
          done

      - name: Smoke test — GET /health on port 8000
        run: |
          response=$(curl -sf http://localhost:8000/health)
          echo "Response: $response"
          echo "$response" | jq -e '.status == "ok"'
          echo "✓ /health passed"

      - name: Smoke test — POST /webhooks/twilio on port 8000
        run: |
          response=$(curl -sf -X POST http://localhost:8000/webhooks/twilio \
            --data-urlencode "From=+15550001234" \
            --data-urlencode "Body=hello world" \
            -H "Content-Type: application/x-www-form-urlencoded")
          echo "Response: $response"
          echo "$response" | grep -q "<Response>"
          echo "$response" | grep -q "<Message>"
          echo "✓ /webhooks/twilio passed"

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v