services:

  api:
    build: .
    image: omnichannel-fitness-agent-api
    pull_policy: build
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

    ports:
      - "8000:8000"

    networks:
      - traefik_proxy
      - internal

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.twilio.rule=Host(`twilio.santzit.com`)"
      - "traefik.http.routers.twilio.entrypoints=web,websecure"
      - "traefik.http.routers.twilio.tls=true"
      - "traefik.http.routers.twilio.tls.certresolver=letsencrypt"
      - "traefik.http.services.twilio.loadbalancer.server.port=8000"
      - "traefik.http.routers.twilio.service=twilio"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness
    ports:
      - "5432:5432"
    volumes:
      - ./setup.sql:/docker-entrypoint-initdb.d/setup.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fitness"]
      interval: 5s
      timeout: 5s
      retries: 10

    networks:
      - internal

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    environment:
      OPENAI_API_BASE: http://api:8000/v1
    ports:
      - "8080:8080"
    depends_on:
      - api

    networks:
      - internal

networks:
  traefik_proxy:
    external: true

  internal:
    driver: bridge
