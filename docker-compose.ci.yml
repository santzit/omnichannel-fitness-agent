# Standalone compose file for CI smoke tests.
# Uses Traefik in HTTP-only mode (no TLS / Let's Encrypt) and
# injects MOCK_AGENT=true so the app starts without real OpenAI / PGVector calls.

services:

  traefik:
    image: traefik:v3.0
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"

  api:
    build: .
    environment:
      OPENAI_API_KEY: "ci-test-key"
      LLM_MODEL: "gpt-4o-mini"
      META_VERIFY_TOKEN: "ci-test-token"
      WHATSAPP_TOKEN: "ci-test-token"
      PHONE_NUMBER_ID: "000000000"
      POSTGRES_URL: "postgresql://postgres:postgres@postgres:5432/fitness"
      MOCK_AGENT: "true"
    depends_on:
      - postgres
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=PathPrefix(`/`)"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.services.api.loadbalancer.server.port=8000"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fitness
